name: build-test-deploy

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: uses node
        uses: action/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm install
      - run: npm run build
      


